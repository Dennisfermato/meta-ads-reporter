name: Daily Meta Ads Report

on:
  schedule:
    - cron: "0 7 * * *"   # 9:00 AM CEST — yesterday's report
    - cron: "0 10 * * *"  # 12:00 PM CEST — today so far
    - cron: "25 14 * * *"  # 4:25 PM CEST (14:25 UTC) — today so far
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run Meta report
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID_CZ: ${{ secrets.META_AD_ACCOUNT_ID_CZ }}
          META_AD_ACCOUNT_ID_HU: ${{ secrets.META_AD_ACCOUNT_ID_HU }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_IDS: ${{ secrets.TELEGRAM_CHAT_IDS }}
        run: python scripts/meta_report.py
