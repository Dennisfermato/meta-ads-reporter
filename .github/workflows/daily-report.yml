name: Daily Meta Ads Report

on:
  schedule:
    # 9:30 AM CEST (UTC+2, summer) = 07:30 UTC
    # Note: in winter (CET, UTC+1) this will fire at 08:30 AM local time
    - cron: "30 7 * * *"
  workflow_dispatch: # allows manual trigger from GitHub UI

jobs:
  send-report:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      - name: Run Meta report
        env:
          META_ACCESS_TOKEN: ${{ secrets.META_ACCESS_TOKEN }}
          META_AD_ACCOUNT_ID_CZ: ${{ secrets.META_AD_ACCOUNT_ID_CZ }}
          META_AD_ACCOUNT_ID_HU: ${{ secrets.META_AD_ACCOUNT_ID_HU }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/meta_report.py
